<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>推し守り - デジタルお守り</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #1a0a0f; }
    #root { height: 100%; }
    :root {
      --pink: #F472B6;
      --pink-dark: #DB2777;
      --pink-light: #FCE7F3;
      --gold: #F59E0B;
      --gold-light: #FEF3C7;
      --cream: #FFF8F5;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2); opacity: 0; }
    }
    @keyframes meter-fill {
      from { height: 0%; }
    }
    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes bounce-in {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.1); opacity: 1; }
      80% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }
    @keyframes flame {
      0%, 100% { transform: scaleY(1) skewX(0deg); opacity: 1; }
      25% { transform: scaleY(1.1) skewX(-3deg); opacity: 0.9; }
      50% { transform: scaleY(0.95) skewX(3deg); opacity: 1; }
      75% { transform: scaleY(1.05) skewX(-2deg); opacity: 0.95; }
    }
    @keyframes smoke-rise {
      0% { transform: translateY(0) scaleX(1); opacity: 0.6; }
      100% { transform: translateY(-60px) scaleX(2); opacity: 0; }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes tap-ripple {
      0% { transform: scale(0); opacity: 0.6; }
      100% { transform: scale(4); opacity: 0; }
    }
    @keyframes full-power-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(244, 114, 182, 0.4), 0 0 40px rgba(244, 114, 182, 0.2); }
      50% { box-shadow: 0 0 40px rgba(244, 114, 182, 0.8), 0 0 80px rgba(244, 114, 182, 0.4); }
    }
    .particle {
      position: absolute;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      font-size: 20px;
      z-index: 100;
    }
    .tap-ripple-el {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: tap-ripple 0.6s ease-out forwards;
    }
    .full-power-animate {
      animation: full-power-glow 1.5s ease-in-out infinite;
    }
    .flame-el {
      animation: flame 0.3s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .smoke-el {
      animation: smoke-rise 1.5s ease-out forwards;
    }
    scrollbar-width: thin;
    scrollbar-color: rgba(244,114,182,0.3) transparent;
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(244,114,182,0.3); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
